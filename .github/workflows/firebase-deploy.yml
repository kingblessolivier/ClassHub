name: Deploy ClassHub to Firebase

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Install Cloud Functions dependencies
        working-directory: functions
        run: npm install

      - name: Set Functions runtime config
        run: |
          firebase functions:config:set anthropic.apikey="${{ secrets.ANTHROPIC_API_KEY }}" --project "${{ secrets.FIREBASE_PROJECT_ID }}" --non-interactive
          if [ -n "${{ secrets.ANTHROPIC_MODEL }}" ]; then
            firebase functions:config:set anthropic.model="${{ secrets.ANTHROPIC_MODEL }}" --project "${{ secrets.FIREBASE_PROJECT_ID }}" --non-interactive
          fi
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}

      - name: Deploy Firestore rules, Storage rules, Hosting, and Functions
        run: firebase deploy --project "${{ secrets.FIREBASE_PROJECT_ID }}" --non-interactive
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}

